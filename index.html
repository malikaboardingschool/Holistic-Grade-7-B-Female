      const [user, setUser] = useState(null);
      const [isOffline, setIsOffline] = useState(!isFirebaseConfigured);

      const [globalSemester, setGlobalSemester] = useState(() => localStorage.getItem('malika_rapor_semester_v3') || "Ganjil 2025/2026");
      const [globalTanggal, setGlobalTanggal] = useState(() => localStorage.getItem('malika_rapor_tanggal_v3') || "19 Desember 2025");
      const [globalWaliKelas, setGlobalWaliKelas] = useState(() => localStorage.getItem('malika_global_wali_kelas_v3') || "Ustadzah Maulana Azka, S.Pd.");
      const [globalWaliKamar, setGlobalWaliKamar] = useState(() => localStorage.getItem('malika_global_wali_kamar_v3') || "Ustadzah Sarah Mutia");
      const [globalJabatanKS, setGlobalJabatanKS] = useState(() => localStorage.getItem('malika_global_jabatan_ks_v3') || "Kepala SMP");
      const [globalNamaKS, setGlobalNamaKS] = useState(() => localStorage.getItem('malika_global_nama_ks_v3') || "Ustadz Abd. Halim, S.S.I");

      const [selectedStudentId, setSelectedStudentId] = useState("1");
      const [editingStudent, setEditingStudent] = useState(null);
      const [alertConfig, setAlertConfig] = useState(null);
      
      // Modal Toggles
      const [showSettingsModal, setShowSettingsModal] = useState(false);
      const [showImportModal, setShowImportModal] = useState(false);
      const [bulkImportText, setBulkImportText] = useState("");
      const [isAddingNew, setIsAddingNew] = useState(false);

      const triggerAlert = (message, title = "Informasi") => {
        setAlertConfig({ type: 'alert', title, message });
      };

      const triggerConfirm = (message, onConfirm, title = "Konfirmasi") => {
        setAlertConfig({ type: 'confirm', title, message, onConfirm });
      };

      useEffect(() => {
        if (!isFirebaseConfigured || !auth) {
          setIsOffline(true);
          return;
        }

        const initAuth = async () => {
          try {
            await auth.signInAnonymously();
          } catch (error) {
            console.error("Autentikasi Firebase Gagal:", error);
            setIsOffline(true);
          }
        };
        initAuth();

        const unsubscribe = auth.onAuthStateChanged((usr) => {
          if (usr) {
            setUser(usr);
            setIsOffline(false);
          } else {
            setIsOffline(true);
          }
        });

        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !db || isOffline) return;

        // Path aman Canvas: artifacts/appId/public/data/students
        const studentsCol = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students');
        
        const unsubscribe = studentsCol.onSnapshot((snapshot) => {
          const list = [];
          snapshot.forEach((doc) => {
            list.push({ id: doc.id, ...doc.data() });
          });

          if (list.length === 0) {
            initialStudents.forEach(async (s) => {
              await studentsCol.doc(s.id).set(s);
            });
            setStudents(initialStudents);
            localStorage.setItem('malika_rapor_students_v3', JSON.stringify(initialStudents));
          } else {
            list.sort((a, b) => {
              const numA = parseInt(a.nis.replace(/\D/g, '')) || 0;
              const numB = parseInt(b.nis.replace(/\D/g, '')) || 0;
              return numA - numB;
            });
            setStudents(list);
            localStorage.setItem('malika_rapor_students_v3', JSON.stringify(list));
          }
        }, (error) => {
          console.error("Firestore error santriwati:", error);
          if (error.message && (error.message.includes('Cloud Firestore API has not been used') || error.message.includes('permission-denied'))) {
            triggerAlert("Mohon aktifkan 'Firestore Database' di Firebase Console Anda. (Klik Build -> Firestore Database -> Create Database -> Start in Test Mode).", "Firestore Belum Aktif");
          }
          setIsOffline(true);
        });

        return () => unsubscribe();
      }, [user, isOffline]);

      useEffect(() => {
        if (!user || !db || isOffline) return;

        const settingsDoc = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('settings').doc('global');
        
        const unsubscribe = settingsDoc.onSnapshot((docSnap) => {
          if (docSnap.exists) {
            const data = docSnap.data();
            if (data.semester) { setGlobalSemester(data.semester); localStorage.setItem('malika_rapor_semester_v3', data.semester); }
            if (data.tanggal) { setGlobalTanggal(data.tanggal); localStorage.setItem('malika_rapor_tanggal_v3', data.tanggal); }
            if (data.waliKelas) { setGlobalWaliKelas(data.waliKelas); localStorage.setItem('malika_global_wali_kelas_v3', data.waliKelas); }
            if (data.waliKamar) { setGlobalWaliKamar(data.waliKamar); localStorage.setItem('malika_global_wali_kamar_v3', data.waliKamar); }
            if (data.jabatanKS) { setGlobalJabatanKS(data.jabatanKS); localStorage.setItem('malika_global_jabatan_ks_v3', data.jabatanKS); }
            if (data.namaKS) { setGlobalNamaKS(data.namaKS); localStorage.setItem('malika_global_nama_ks_v3', data.namaKS); }
          } else {
            settingsDoc.set({
              semester: globalSemester,
              tanggal: globalTanggal,
              waliKelas: globalWaliKelas,
              waliKamar: globalWaliKamar,
              jabatanKS: globalJabatanKS,
              namaKS: globalNamaKS
            });
          }
        }, (error) => {
          console.error("Firestore error setting:", error);
          setIsOffline(true);
        });

        return () => unsubscribe();
      }, [user, isOffline]);

      const updateGlobalSetting = async (key, val) => {
        if (key === 'semester') { setGlobalSemester(val); localStorage.setItem('malika_rapor_semester_v3', val); }
        if (key === 'tanggal') { setGlobalTanggal(val); localStorage.setItem('malika_rapor_tanggal_v3', val); }
        if (key === 'waliKelas') { setGlobalWaliKelas(val); localStorage.setItem('malika_global_wali_kelas_v3', val); }
        if (key === 'waliKamar') { setGlobalWaliKamar(val); localStorage.setItem('malika_global_wali_kamar_v3', val); }
        if (key === 'jabatanKS') { setGlobalJabatanKS(val); localStorage.setItem('malika_global_jabatan_ks_v3', val); }
        if (key === 'namaKS') { setGlobalNamaKS(val); localStorage.setItem('malika_global_nama_ks_v3', val); }

        if (user && db && !isOffline) {
          try {
            const settingsDoc = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('settings').doc('global');
            await settingsDoc.set({ [key]: val }, { merge: true });
          } catch (err) {
            console.error("Gagal update setting cloud:", err);
          }
        }
      };

      const selectedStudent = students.find(s => String(s.id) === String(selectedStudentId)) || students[0] || null;
      const currentIndex = students.findIndex(s => String(s.id) === String(selectedStudentId));

      // FUNGSI NAVIGASI YANG DIPERBAIKI (TIDAK LAGI REFERENCE ERROR)
      const handlePrev = () => {
        if (students.length === 0) return;
        if (currentIndex > 0) {
          setSelectedStudentId(students[currentIndex - 1].id);
        } else {
          setSelectedStudentId(students[students.length - 1].id);
        }
      };

      const handleNext = () => {
        if (students.length === 0) return;
        if (currentIndex < students.length - 1) {
          setSelectedStudentId(students[currentIndex + 1].id);
        } else {
          setSelectedStudentId(students[0].id);
        }
      };

      const handleSaveStudent = async (studentData) => {
        const studentId = studentData.id || Date.now().toString();
        const updatedPayload = {
          ...studentData,
          id: studentId,
          sas: Number(studentData.sas) || 80,
          sat: Number(studentData.sat) || 80,
          tahfizh_juz: Number(studentData.tahfizh_juz) || 0
        };

        const existing = students.find(s => String(s.id) === String(studentId));
        let updatedStudents;
        if(existing) {
          updatedStudents = students.map(s => String(s.id) === String(studentId) ? updatedPayload : s);
        } else {
          updatedStudents = [...students, updatedPayload];
        }
        
        setStudents(updatedStudents);
        localStorage.setItem('malika_rapor_students_v3', JSON.stringify(updatedStudents));
        
        setSelectedStudentId(studentId);
        setEditingStudent(null);
        setShowSettingsModal(false);
        setIsAddingNew(false);

        if (user && db && !isOffline) {
          try {
            const studentDocRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(studentId);
            await studentDocRef.set(updatedPayload);
            triggerAlert(`Data rapor ananda ${studentData.nama} berhasil disinkronkan ke cloud!`, "Sukses Menyimpan");
          } catch (err) {
            console.error("Gagal sinkronisasi ke cloud:", err);
            triggerAlert(`Data disimpan secara lokal di perangkat ini (Gagal sinkron ke awan).`, "Tersimpan Lokal");
          }
        } else {
          triggerAlert(`Data rapor ananda ${studentData.nama} berhasil disimpan secara lokal di perangkat ini.`, "Tersimpan Lokal");
        }
      };

      const handleDeleteStudent = (id, name) => {
        triggerConfirm(`Apakah Anda yakin ingin menghapus data santriwati "${name}" secara permanen?`, async () => {
          const filtered = students.filter(s => String(s.id) !== String(id));
          setStudents(filtered);
          localStorage.setItem('malika_rapor_students_v3', JSON.stringify(filtered));
          
          if (String(selectedStudentId) === String(id) && filtered.length > 0) {
            setSelectedStudentId(filtered[0].id);
          }

          if (user && db && !isOffline) {
            try {
              const studentDocRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(id);
              await studentDocRef.delete();
              triggerAlert("Data santriwati berhasil dihapus dari perangkat dan cloud.", "Sukses Terhapus");
            } catch (err) {
              console.error("Gagal menghapus di cloud:", err);
              triggerAlert("Data dihapus secara lokal (Gagal menghapus di awan).", "Terhapus Lokal");
            }
          } else {
            triggerAlert("Data santriwati berhasil dihapus secara lokal.", "Sukses Terhapus");
          }
          setEditingStudent(null);
        });
      };

      const handlePrint = () => { window.print(); };

      const calculateChange = (student) => {
        if (!student || !student.sas) return { percent: "0", positive: true };
        const diff = student.sat - student.sas;
        const percent = ((diff / student.sas) * 100).toFixed(1);
        return { percent: Math.abs(percent), positive: diff >= 0 };
      };

      const progress = selectedStudent ? calculateChange(selectedStudent) : { percent: "0", positive: true };

      // Helpers untuk Manajemen Tambah/Hapus/Ekspor
      const handleDownloadExcel = () => {
        const headers = ["Nama Lengkap", "NIS/Kelas", "Nilai SAS (Ganjil)", "Nilai SAT (Genap)", "Hasil Psikotes", "Progres 1 Semester", "Mapel Unggul", "Mapel Perlu Peningkatan", "Observasi Ibadah Harian", "Tahfizh (Juz)", "Keterangan Tahfizh", "Sikap dan Disiplin", "Sosial dan Kepemimpinan", "Prestasi Non-Akademik", "Fokus Kelas Selanjutnya", "Pesan Wali Kelas"];
        const rows = students.map(s => [s.nama || "", s.nis || "", s.sas || 80, s.sat || 80, s.psikotes || "", s.progres_1s || "", s.mapel_unggul || "", s.mapel_perlu || "", s.ibadah || "", s.tahfizh_juz || 0, s.tahfizh_detail || "", s.disiplin || "", s.sosial || "", s.prestasi || "", s.fokus || "", s.pesan_wali || ""]);
        const escapeCSV = (val) => {
          let str = String(val).replace(/"/g, '""');
          if (str.includes(',') || str.includes('\n') || str.includes('\r') || str.includes('"') || str.includes(';')) return `"${str}"`;
          return str;
        };
        const csvContent = "\uFEFF" + [headers.join(";"), ...rows.map(r => r.map(escapeCSV).join(";"))].join("\n");
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.setAttribute("href", URL.createObjectURL(blob));
        link.setAttribute("download", `database_rapor_malika_${globalSemester.replace(/[\/\s]/g, '_')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const handleImportTSV = async () => {
        try {
          const lines = bulkImportText.trim().split("\n");
          if (lines.length < 2) {
            triggerAlert("Mohon masukkan data spreadsheet (minimal tajuk dan 1 baris).", "Gagal Impor");
            return;
          }
          const headers = lines[0].toLowerCase().split("\t").map(h => h.trim());
          const newStudents = [];
          for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const cols = lines[i].split("\t").map(c => c.trim());
            const rowObj = {};
            headers.forEach((header, index) => {
              let key = header;
              if (header.includes("nama")) key = "nama";
              else if (header.includes("nis") || header.includes("kelas")) key = "nis";
              else if (header.includes("sas") || header.includes("ganjil")) key = "sas";
              else if (header.includes("sat") || header.includes("genap")) key = "sat";
              else if (header.includes("psikotes")) key = "psikotes";
              else if (header.includes("progres")) key = "progres_1s";
              else if (header.includes("unggul")) key = "mapel_unggul";
              else if (header.includes("perlu")) key = "mapel_perlu";
              else if (header.includes("ibadah")) key = "ibadah";
              else if (header.includes("tahfizh_juz") || header.includes("juz")) key = "tahfizh_juz";
              else if (header.includes("tahfizh_detail")) key = "tahfizh_detail";
              else if (header.includes("disiplin") || header.includes("sikap")) key = "disiplin";
              else if (header.includes("sosial")) key = "sosial";
              else if (header.includes("prestasi")) key = "prestasi";
              else if (header.includes("fokus")) key = "fokus";
              else if (header.includes("pesan")) key = "pesan_wali";
              rowObj[key] = cols[index];
            });
            
            const studentId = (Date.now() + i).toString();
            rowObj.id = studentId;
            rowObj.sas = Number(rowObj.sas) || 80;
            rowObj.sat = Number(rowObj.sat) || 80;
            rowObj.tahfizh_juz = Number(rowObj.tahfizh_juz) || 0;
            rowObj.nama = rowObj.nama || "Santriwati Baru " + i;
            rowObj.nis = rowObj.nis || "NIS-xxx";
            newStudents.push(rowObj);
          }
          const updatedStudents = [...students, ...newStudents];
          setStudents(updatedStudents);
          localStorage.setItem('malika_rapor_students_v3', JSON.stringify(updatedStudents));

          if (user && db && !isOffline) {
            try {
              for (const s of newStudents) {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(s.id).set(s);
              }
              triggerAlert(`Berhasil mengimpor ${newStudents.length} data ke cloud!`, "Impor Sukses");
            } catch (err) {
              triggerAlert(`Berhasil mengimpor data secara lokal (gagal sinkronisasi).`, "Impor Lokal");
            }
          } else {
            triggerAlert(`Berhasil mengimpor data secara lokal.`, "Impor Lokal");
          }
          setShowImportModal(false);
          setBulkImportText("");
        } catch (err) {
          triggerAlert("Gagal memproses data impor ke database.", "Kesalahan");
        }
      };

      const handleResetDatabase = () => {
        triggerConfirm("Hapus semua data lokal dan kembalikan ke daftar default Malika?", async () => {
          setStudents(initialStudents);
          localStorage.setItem('malika_rapor_students_v3', JSON.stringify(initialStudents));
          setSelectedStudentId("1");
          setShowSettingsModal(false);
          triggerAlert("Database telah direset ke lokal default.", "Reset Sukses");
        });
      };

      const getTemplateTSV = () => {
        const headers = "Nama Lengkap\tNIS/Kelas\tNilai SAS (Ganjil)\tNilai SAT (Genap)\tHasil Psikotes\tProgres 1 Semester\tMapel Unggul\tMapel Perlu Peningkatan\tObservasi Ibadah Harian\tTahfizh (Juz)\tKeterangan Tahfizh\tSikap dan Disiplin\tSosial dan Kepemimpinan\tPrestasi Non-Akademik\tFokus Kelas Selanjutnya\tPesan Wali Kelas";
        const dummyRow = "Aira Fitriani Azzahra\tNIS-001/7 A\t85\t90\tPotensi kognitif logis yang sangat unggul.\tMengalami kemajuan signifikan di kelas.\tMatematika, IPA\tBahasa Inggris\tSangat rajin shalat berjamaah dan ramah.\t4\t4 Juz lancar\tSangat disiplin dan taat.\tMemiliki pengaruh kepemimpinan yang baik.\tJuara 2 Memanah\tFokus pada kematangan tata bahasa arab.\tPertahankan prestasimu nak!";
        
        setBulkImportText(`${headers}\n${dummyRow}`);
        triggerAlert("Template berhasil dimuat di kolom teks di bawah! Anda bisa menyalinnya ke Microsoft Excel atau Google Sheets untuk diisi, atau langsung klik tombol 'Proses & Impor' untuk mencoba mengimpor data contoh tersebut.", "Template Berhasil Dimuat");
      };

      return (
        <div className="flex flex-col lg:flex-row h-screen w-full bg-slate-200 overflow-hidden font-sans text-slate-800">
          
          {/* ========================================= */}
          {/* SIDEBAR (MENU KIRI / TOP MOBILE)          */}
          {/* ========================================= */}
          <aside className="w-full lg:w-80 bg-white border-r border-slate-200 flex flex-col flex-shrink-0 shadow-xl z-20 print:hidden h-auto lg:h-full">
            
            {/* Header / Logo Area */}
            <div className="p-4 border-b border-slate-100 flex items-center gap-3 bg-[#2b3990] text-white">
              <div className="w-10 h-10 rounded-full bg-white flex items-center justify-center p-1 shadow-inner flex-shrink-0">
                <img src="https://iili.io/FsLlXA7.png" alt="Logo Malika" className="w-full h-full object-contain" />
              </div>
              <div>
                <h1 className="text-sm font-extrabold tracking-wide leading-tight">MALIKA ISLAMIC SCHOOL</h1>
                <p className="text-[10px] text-indigo-200">Sistem Laporan Holistik</p>
              </div>
            </div>

            {/* Menu Operasional Sederhana */}
            <div className="p-5 flex-grow flex flex-col gap-5 overflow-y-auto">
              
              {/* Dropdown Siswi */}
              <div>
                <label className="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">Pilih Santriwati</label>
                <div className="relative">
                  <select value={selectedStudentId} onChange={(e) => setSelectedStudentId(e.target.value)} className="w-full h-11 pl-3.5 pr-8 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-xl text-sm font-bold text-[#2b3990] focus:ring-2 focus:ring-indigo-500 focus:outline-none appearance-none cursor-pointer transition">
                    {students.map((s, idx) => (
                      <option key={s.id} value={s.id}>
                        {idx + 1}. {s.nama} ({s.nis.split('/')[0]})
                      </option>
                    ))}
                  </select>
                  <div className="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-slate-400">
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M8.25 15L12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9"/></svg>
                  </div>
                </div>
                
                {/* Navigasi Prev/Next Cepat */}
                <div className="flex gap-2 mt-2">
                  <button onClick={handlePrev} className="flex-1 h-8 bg-slate-50 hover:bg-slate-100 text-slate-600 rounded-lg text-[10px] font-bold transition border">Sebelumnya</button>
                  <button onClick={handleNext} className="flex-1 h-8 bg-slate-50 hover:bg-slate-100 text-slate-600 rounded-lg text-[10px] font-bold transition border">Berikutnya</button>
                </div>
              </div>

              {/* Action Buttons */}
              <div className="pt-2 border-t border-slate-100 flex flex-col gap-3">
                <button onClick={() => setEditingStudent(selectedStudent)} className="w-full h-11 bg-[#00aeef] hover:bg-sky-500 text-white font-black text-sm rounded-xl transition shadow-md flex items-center justify-center gap-2">
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125"/></svg>
                  Edit Rapor Siswi Ini
                </button>
                
                <button onClick={handlePrint} className="w-full h-11 bg-slate-800 hover:bg-slate-900 text-white font-black text-sm uppercase rounded-xl transition shadow-md flex items-center justify-center gap-2">
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M6.72 13.829c-.24.03-.48.062-.72.096m.72-.096a42.415 42.415 0 0110.56 0m-10.56 0L6.34 18m10.94-4.171c.24.03.48.062.72.096m-.72-.096L17.66 18m0 0l.229 2.523a1.125 1.125 0 01-1.12 1.227H7.231c-.662 0-1.18-.568-1.12-1.227L6.34 18m11.318 0h1.091A2.25 2.25 0 0021 15.75V9.456c0-1.081-.768-2.015-1.837-2.175a48.055 48.055 0 00-14.326 0C3.768 7.28 3 8.215 3 9.456v6.293a2.25 2.25 0 002.25 2.25h1.091M12 10.125a2.25 2.25 0 100-4.5 2.25 2.25 0 000 4.5z"/></svg>
                  Cetak (Print) PDF
                </button>
              </div>

            </div>

            {/* Sidebar Footer: Info Koneksi & Settings Toggle */}
            <div className="p-4 border-t border-slate-100 bg-slate-50 flex items-center justify-between mt-auto">
              <div className="flex items-center gap-1.5">
                 {isOffline ? (
                   <span className="flex items-center gap-1 text-[10px] font-bold text-rose-600 bg-rose-50 px-2 py-1 rounded-full"><span className="w-1.5 h-1.5 rounded-full bg-rose-500"></span>Offline Lokal</span>
                 ) : (
                   <span className="flex items-center gap-1 text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded-full"><span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>Awan Terhubung</span>
                 )}

                      <input type="number" value={editingStudent.sas} onChange={(e) => setEditingStudent({...editingStudent, sas: Number(e.target.value)})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-[#2b3990] focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                    </div>
                    <div>
                      <label className="block text-xs font-bold mb-1 text-slate-600">Nilai Genap (SAT)</label>
                      <input type="number" value={editingStudent.sat} onChange={(e) => setEditingStudent({...editingStudent, sat: Number(e.target.value)})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-sky-600 focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                    </div>
                  </div>

                  <div className="sm:col-span-2 grid grid-cols-3 gap-2">
                     <div className="col-span-1">
                       <label className="block text-xs font-bold mb-1 text-slate-600">Total Juz (Angka)</label>
                       <input type="number" value={editingStudent.tahfizh_juz} onChange={(e) => setEditingStudent({...editingStudent, tahfizh_juz: Number(e.target.value)})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-teal-700 focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                     </div>
                     <div className="col-span-2">
                       <label className="block text-xs font-bold mb-1 text-slate-600">Detail Surat / Juz</label>
                       <input type="text" value={editingStudent.tahfizh_detail} onChange={(e) => setEditingStudent({...editingStudent, tahfizh_detail: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                     </div>
                  </div>

                  {/* Textareas */}
                  <div className="sm:col-span-2">
                    <label className="block text-xs font-bold mb-1 text-slate-600">Analisis Psikotes</label>
                    <textarea value={editingStudent.psikotes} onChange={(e) => setEditingStudent({...editingStudent, psikotes: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm h-16 resize-y focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>

                  {/* Komponen Progres (Dropdown Terintegrasi) */}
                  <div className="sm:col-span-2 bg-indigo-50/40 border border-indigo-100 p-3 rounded-xl">
                    <div className="flex flex-col gap-1.5 mb-2">
                      <label className="block text-xs font-bold text-indigo-900">Progres 1 Semester</label>
                      <select 
                        onChange={(e) => {
                          if (e.target.value) {
                            setEditingStudent({...editingStudent, progres_1s: e.target.value});
                            e.target.value = ""; 
                          }
                        }}
                        className="text-[10px] text-indigo-700 bg-white border border-indigo-200 rounded-lg px-2.5 py-1.5 w-full outline-none cursor-pointer font-bold"
                      >
                        <option value="">⚡ Pilih Templat Jawaban Cepat...</option>
                        {QUICK_TEMPLATES.progres_1s.map((opt, idx) => (
                          <option key={idx} value={opt}>Opsi {idx + 1}: {opt.substring(0, 50)}...</option>
                        ))}
                      </select>
                    </div>
                    <textarea value={editingStudent.progres_1s} onChange={(e) => setEditingStudent({...editingStudent, progres_1s: e.target.value})} className="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm h-16 resize-y focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>

                  <div className="sm:col-span-1">
                    <label className="block text-xs font-bold mb-1 text-slate-600">Mata Pelajaran Unggul</label>
                    <input type="text" value={editingStudent.mapel_unggul} onChange={(e) => setEditingStudent({...editingStudent, mapel_unggul: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>
                  <div className="sm:col-span-1">
                    <label className="block text-xs font-bold mb-1 text-slate-600">Perlu Peningkatan</label>
                    <input type="text" value={editingStudent.mapel_perlu} onChange={(e) => setEditingStudent({...editingStudent, mapel_perlu: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>

                  {/* Komponen Ibadah */}
                  <div className="sm:col-span-2 bg-indigo-50/40 border border-indigo-100 p-3 rounded-xl">
                    <div className="flex flex-col gap-1.5 mb-2">
                      <label className="block text-xs font-bold text-indigo-900">Observasi Ibadah Harian</label>
                      <select 
                        onChange={(e) => {
                          if (e.target.value) {
                            setEditingStudent({...editingStudent, ibadah: e.target.value});
                            e.target.value = "";
                          }
                        }}
                        className="text-[10px] text-indigo-700 bg-white border border-indigo-200 rounded-lg px-2.5 py-1.5 w-full outline-none cursor-pointer font-bold"
                      >
                        <option value="">⚡ Pilih Templat Jawaban Cepat...</option>
                        {QUICK_TEMPLATES.ibadah.map((opt, idx) => (
                          <option key={idx} value={opt}>Opsi {idx + 1}: {opt.substring(0, 50)}...</option>
                        ))}
                      </select>
                    </div>
                    <textarea value={editingStudent.ibadah} onChange={(e) => setEditingStudent({...editingStudent, ibadah: e.target.value})} className="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm h-16 resize-y focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>

                  {/* Komponen Disiplin */}
                  <div className="sm:col-span-2 bg-indigo-50/40 border border-indigo-100 p-3 rounded-xl">
                    <div className="flex flex-col gap-1.5 mb-2">
                      <label className="block text-xs font-bold text-indigo-900">Sikap dan Disiplin</label>
                      <select 
                        onChange={(e) => {
                          if (e.target.value) {
                            setEditingStudent({...editingStudent, disiplin: e.target.value});
                            e.target.value = "";
                          }
                        }}
                        className="text-[10px] text-indigo-700 bg-white border border-indigo-200 rounded-lg px-2.5 py-1.5 w-full outline-none cursor-pointer font-bold"
                      >
                        <option value="">⚡ Pilih Templat Jawaban Cepat...</option>
                        {QUICK_TEMPLATES.disiplin.map((opt, idx) => (
                          <option key={idx} value={opt}>Opsi {idx + 1}: {opt.substring(0, 50)}...</option>
                        ))}
                      </select>
                    </div>
                    <textarea value={editingStudent.disiplin} onChange={(e) => setEditingStudent({...editingStudent, disiplin: e.target.value})} className="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm h-16 resize-y focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>

                  {/* Komponen Sosial */}
                  <div className="sm:col-span-2 bg-indigo-50/40 border border-indigo-100 p-3 rounded-xl">
                    <div className="flex flex-col gap-1.5 mb-2">
                      <label className="block text-xs font-bold text-indigo-900">Sosial & Kepemimpinan</label>
                      <select 
                        onChange={(e) => {
                          if (e.target.value) {
                            setEditingStudent({...editingStudent, sosial: e.target.value});
                            e.target.value = "";
                          }
                        }}
                        className="text-[10px] text-indigo-700 bg-white border border-indigo-200 rounded-lg px-2.5 py-1.5 w-full outline-none cursor-pointer font-bold"
                      >
                        <option value="">⚡ Pilih Templat Jawaban Cepat...</option>
                        {QUICK_TEMPLATES.sosial.map((opt, idx) => (
                          <option key={idx} value={opt}>Opsi {idx + 1}: {opt.substring(0, 50)}...</option>
                        ))}
                      </select>
                    </div>
                    <textarea value={editingStudent.sosial} onChange={(e) => setEditingStudent({...editingStudent, sosial: e.target.value})} className="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm h-16 resize-y focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>

                  {/* Komponen Prestasi */}
                  <div className="sm:col-span-2 bg-indigo-50/40 border border-indigo-100 p-3 rounded-xl">
                    <div className="flex flex-col gap-1.5 mb-2">
                      <label className="block text-xs font-bold text-indigo-900">Prestasi Non-Akademik</label>
                      <select 
                        onChange={(e) => {
                          if (e.target.value) {
                            setEditingStudent({...editingStudent, prestasi: e.target.value});
                            e.target.value = "";
                          }
                        }}
                        className="text-[10px] text-indigo-700 bg-white border border-indigo-200 rounded-lg px-2.5 py-1.5 w-full outline-none cursor-pointer font-bold"
                      >
                        <option value="">⚡ Pilih Templat Jawaban Cepat...</option>
                        {QUICK_TEMPLATES.prestasi.map((opt, idx) => (
                          <option key={idx} value={opt}>Opsi {idx + 1}: {opt.substring(0, 50)}...</option>
                        ))}
                      </select>
                    </div>
                    <input type="text" value={editingStudent.prestasi} onChange={(e) => setEditingStudent({...editingStudent, prestasi: e.target.value})} className="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>

                  {/* Komponen Fokus */}
                  <div className="sm:col-span-2 bg-indigo-50/40 border border-indigo-100 p-3 rounded-xl">
                    <div className="flex flex-col gap-1.5 mb-2">
                      <label className="block text-xs font-bold text-indigo-900">Fokus Kelas Selanjutnya</label>
                      <select 
                        onChange={(e) => {
                          if (e.target.value) {
                            setEditingStudent({...editingStudent, fokus: e.target.value});
                            e.target.value = "";
                          }
                        }}
                        className="text-[10px] text-indigo-700 bg-white border border-indigo-200 rounded-lg px-2.5 py-1.5 w-full outline-none cursor-pointer font-bold"
                      >
                        <option value="">⚡ Pilih Templat Jawaban Cepat...</option>
                        {QUICK_TEMPLATES.fokus.map((opt, idx) => (
                          <option key={idx} value={opt}>Opsi {idx + 1}: {opt.substring(0, 50)}...</option>
                        ))}
                      </select>
                    </div>
                    <textarea value={editingStudent.fokus} onChange={(e) => setEditingStudent({...editingStudent, fokus: e.target.value})} className="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm h-16 resize-y focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>

                  {/* Komponen Pesan Wali */}
                  <div className="sm:col-span-2 bg-indigo-50/40 border border-indigo-100 p-3 rounded-xl">
                    <div className="flex flex-col gap-1.5 mb-2">
                      <label className="block text-xs font-bold text-indigo-900">Pesan Wali Kelas & Wali Kamar</label>
                      <select 
                        onChange={(e) => {
                          if (e.target.value) {
                            setEditingStudent({...editingStudent, pesan_wali: e.target.value});
                            e.target.value = "";
                          }
                        }}
                        className="text-[10px] text-indigo-700 bg-white border border-indigo-200 rounded-lg px-2.5 py-1.5 w-full outline-none cursor-pointer font-bold"
                      >
                        <option value="">⚡ Pilih Templat Jawaban Cepat...</option>
                        {QUICK_TEMPLATES.pesan_wali.map((opt, idx) => (
                          <option key={idx} value={opt}>Opsi {idx + 1}: {opt.substring(0, 50)}...</option>
                        ))}
                      </select>
                    </div>
                    <textarea value={editingStudent.pesan_wali} onChange={(e) => setEditingStudent({...editingStudent, pesan_wali: e.target.value})} className="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm h-16 resize-y focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>
                </div>
                
                <div className="flex justify-between items-center pt-4 border-t sticky bottom-0 bg-white z-10 pb-2">
                  <button onClick={() => handleDeleteStudent(editingStudent.id, editingStudent.nama)} className="px-3 py-2 text-sm font-semibold text-rose-500 hover:bg-rose-50 rounded-xl transition">Hapus</button>
                  <div className="flex gap-2">
                     <button onClick={() => setEditingStudent(null)} className="px-4 py-2 text-sm font-semibold text-slate-500 hover:bg-slate-100 rounded-xl">Batal</button>
                     <button onClick={() => handleSaveStudent(editingStudent)} className="px-6 py-2.5 text-sm font-semibold text-white bg-[#2b3990] hover:bg-[#1f2a70] rounded-xl shadow-md transition">Simpan Rapor</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* MODAL IMPOR EXCEL */}
          {showImportModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-2xl p-6 space-y-4">
                <div className="flex justify-between items-start border-b pb-2">
                  <div>
                    <h3 className="text-lg font-bold text-[#2b3990]">📥 Impor Massal dari Spreadsheet</h3>
                    <p className="text-xs text-slate-500">Ketik/Tempel baris data yang Anda salin dari Google Sheets / Excel.</p>
                  </div>
                  <button onClick={getTemplateTSV} className="text-xs bg-indigo-50 hover:bg-indigo-100 text-[#2b3990] font-black px-3.5 py-2 rounded-xl transition">Ambil Template</button>
                </div>
                
                <textarea 
                  placeholder="Tempel baris spreadsheet Anda di sini..." 
                  value={bulkImportText} 
                  onChange={(e) => setBulkImportText(e.target.value)} 
                  className="w-full h-64 p-3.5 bg-slate-50 border border-slate-200 rounded-xl text-[11px] font-mono resize-none focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                />
                
                <div className="flex justify-between items-center pt-4 border-t">
                  <span className="text-[11px] text-slate-400">Pastikan baris pertama berisi nama tajuk kolom.</span>
                  <div className="flex gap-2">
                    <button onClick={() => setShowImportModal(false)} className="px-4 py-2 text-sm font-semibold text-slate-500 hover:bg-slate-100 rounded-xl">Batal</button>
                    <button onClick={handleImportTSV} className="px-4 py-2 text-sm font-semibold text-white bg-[#2b3990] hover:bg-[#1f2a70] rounded-xl shadow transition">Impor</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* MODAL NOTIFIKASI DIALOG */}
          {alertConfig && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 space-y-4 text-center border">
                <div className="w-12 h-12 rounded-full bg-indigo-50 text-[#2b3990] flex items-center justify-center mx-auto text-xl">
                  {alertConfig.type === 'confirm' ? '❓' : '💡'}
                </div>
                <div>
                  <h3 className="text-base font-extrabold text-slate-900">{alertConfig.title}</h3>
                  <p className="text-xs text-slate-500 mt-2 leading-relaxed">{alertConfig.message}</p>
                </div>
                <div className="flex justify-center gap-2 pt-2">
                  {alertConfig.type === 'confirm' && (
                    <button onClick={() => setAlertConfig(null)} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-xs uppercase rounded-xl transition">Batal</button>
                  )}
                  <button onClick={() => { if (alertConfig.type === 'confirm' && alertConfig.onConfirm) alertConfig.onConfirm(); setAlertConfig(null); }} className="px-5 py-2.5 bg-[#2b3990] hover:bg-[#1f2a70] text-white font-bold text-xs uppercase rounded-xl shadow transition">OK</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />); 
  </script>
</body>
</html>
